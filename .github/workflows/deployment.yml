name: auto deployment

on: 
  push: 
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests with Maven
        run: mvn test

  build-and-package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build production package with Maven
        run: mvn -B clean package -DskipTests

      - name: Create Dockerfile dynamically
        run: |
          cat > Dockerfile <<'EOF'
          FROM eclipse-temurin:17-jre-alpine
          COPY target/*.jar app.jar
          EXPOSE 8080
          ENTRYPOINT ["java","-jar","/app.jar"]
          EOF

      - name: Commit and push Dockerfile to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git diff-index --quiet HEAD || git commit -m "chore: add auto-generated Dockerfile for deployment"
          git push
